name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  shellcheck:
    name: Shell checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck jq

      - name: Syntax check
        run: bash -n bin/codex-healthkit scripts/render-demo.sh scripts/render-visuals.sh tests/run.sh tests/fixtures/fake-bin/codex

      - name: ShellCheck
        run: shellcheck bin/codex-healthkit scripts/render-demo.sh scripts/render-visuals.sh tests/run.sh tests/fixtures/fake-bin/codex

      - name: Test
        run: tests/run.sh

      - name: Validate JSON output
        run: ./bin/codex-healthkit check --json | jq empty

  macos:
    name: macOS smoke test
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Syntax check
        run: bash -n bin/codex-healthkit scripts/render-demo.sh scripts/render-visuals.sh tests/run.sh tests/fixtures/fake-bin/codex

      - name: Test
        run: tests/run.sh
