<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">codex-healthkit safety boundary demo</title>
  <desc id="desc">Synthetic terminal card lists the credentials and content that codex-healthkit does not read.</desc>
  <rect width="1200" height="675" fill="#0b1117"/>
  <rect x="48" y="42" width="1104" height="590" rx="8" fill="#121b23" stroke="#33434f" stroke-width="2"/>
  <circle cx="82" cy="75" r="7" fill="#ff7b72"/><circle cx="106" cy="75" r="7" fill="#ffc857"/><circle cx="130" cy="75" r="7" fill="#67d391"/>
  <text x="600" y="83" text-anchor="middle" fill="#c2cdd4" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" font-weight="700">codex-healthkit • fixture-only demo</text>
  <text x="86" y="150" fill="#ffc977" font-family="Arial, sans-serif" font-size="30" font-weight="800">READS NO</text>
  <text x="86" y="210" fill="#f4f7f8" font-family="Arial, sans-serif" font-size="27" font-weight="700">credentials • tokens • cookies</text>
  <text x="86" y="258" fill="#f4f7f8" font-family="Arial, sans-serif" font-size="27" font-weight="700">SQLite contents • transcript contents</text>
  <text x="86" y="340" fill="#67d391" font-family="Arial, sans-serif" font-size="30" font-weight="800">DOES NOT</text>
  <text x="86" y="400" fill="#f4f7f8" font-family="Arial, sans-serif" font-size="27" font-weight="700">upload • clean up • run a daemon</text>
  <text x="86" y="464" fill="#8fd5f1" font-family="Arial, sans-serif" font-size="24" font-weight="700">Review every report before sharing.</text>
  <text x="86" y="572" fill="#7f919d" font-family="Arial, sans-serif" font-size="20" font-weight="700">16–24 seconds • safety boundary</text>
</svg>
